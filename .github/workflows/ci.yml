name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default-deny at the top level. Each job re-grants the minimum it needs.
permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project

      - name: Lint
        run: npm run lint

  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build packages
            run: npm run build
          - name: Test
            run: npm test

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project

      - name: ${{ matrix.name }}
        run: ${{ matrix.run }}

  audit-signatures:
    name: Audit registry signatures (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project

      # Verifies the registry's ECDSA signatures over every installed package.
      # Advisory for now (some transitive deps may lack signatures); promote to
      # blocking once the tree is clean.
      - name: npm audit signatures
        run: npm audit signatures
        continue-on-error: true

  changeset-status:
    name: Changeset status (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node project
        uses: ./.github/actions/setup-node-project

      - name: Show pending changesets
        run: npx changeset status --since=origin/${{ github.base_ref }} --verbose
        continue-on-error: true
