name: Release

# `detect` (read-only, no id-token) decides what this push should do from
# ground truth — changeset files for the Version PR, registry state for the
# publish — so neither real job ever reaches the npm-publish gate without
# work to do. See RELEASING.md and SECURITY.md.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  detect:
    name: Detect release work
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hasChangesets: ${{ steps.detect.outputs.hasChangesets }}
      shouldPublish: ${{ steps.detect.outputs.shouldPublish }}
    steps:
      # Release jobs use setup-node (not mise) so egress can be fully blocked:
      # setup-node fetches Node from GitHub, unlike mise's nodejs.org pull.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # node-version kept in lockstep with mise.toml. No npm ci — the detect
      # script is dependency-free and only calls `npm view`.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.17.0'

      - name: Detect release work
        id: detect
        run: npm run ci:detect

  version-pr:
    name: Open or update Version PR
    needs: detect
    if: needs.detect.outputs.hasChangesets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # block egress: this job holds a write-capable GITHUB_TOKEN while running
      # changeset version + npm install, so a compromised dependency must not
      # have open outbound network.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.17.0'

      - name: Install dependencies
        run: npm ci

      - name: Run changesets (version path)
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npm run ci:version
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: detect
    if: needs.detect.outputs.shouldPublish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # The publish job owns Node + registry context via setup-node (not mise)
      # so the OIDC-critical step has predictable egress. node-version is kept
      # in lockstep with mise.toml; its bundled npm (11.13.0) supports OIDC
      # trusted publishing and provenance.
      - name: Configure Node for OIDC trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.17.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Assert npm version (>= 11.10.0 for cooldown parity)
        run: |
          NPM_V="$(npm -v)"
          echo "npm ${NPM_V}"
          node -e 'const [a,b]=process.argv[1].split(".").map(Number); process.exit(a>11||(a===11&&b>=10)?0:1)' "${NPM_V}" \
            || { echo "npm ${NPM_V} is below the 11.10.0 floor"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Run changesets (publish path)
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: '' # defeat any fallback to a static credential; OIDC only

      - name: Summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "- \(.name)@\(.version)"' >> "$GITHUB_STEP_SUMMARY"
