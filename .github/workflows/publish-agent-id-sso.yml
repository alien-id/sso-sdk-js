name: Agent ID SSO Package

on:
  push:
    branches:
      - main
    paths:
      - "packages/agent-id-sso/src/**"
    tags:
      - "agent-id-sso@*"
  pull_request:
    branches:
      - main
    paths:
      - "packages/agent-id-sso/src/**"
  workflow_dispatch:

jobs:
  test:
    name: Test
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        working-directory: packages/agent-id-sso
        run: npm run build

      - name: Run tests
        working-directory: packages/agent-id-sso
        run: npm test

  publish:
    name: Build and Publish Agent ID SSO Package
    if: startsWith(github.ref, 'refs/tags/agent-id-sso@')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package.json version
        working-directory: packages/agent-id-sso
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="agent-id-sso@${PACKAGE_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Error: Tag $TAG_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "Tag matches package.json version"

      - name: Build package
        working-directory: packages/agent-id-sso
        run: npm run build

      - name: Run tests
        working-directory: packages/agent-id-sso
        run: npm test

      - name: Pack
        working-directory: packages/agent-id-sso
        run: npm pack

      - name: Determine npm tag
        id: npm-tag
        working-directory: packages/agent-id-sso
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: packages/agent-id-sso
        run: npm publish ./alien-id-agent-id-sso-*.tgz --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          prerelease: ${{ steps.npm-tag.outputs.tag != 'latest' }}
          make_latest: ${{ steps.npm-tag.outputs.tag == 'latest' }}
          body: |
            ## npm
            https://www.npmjs.com/package/@alien-id/agent-id-sso
